name: Release CI  # release-branch workflow, structurally drifted from master
on:
  push:
    branches: [release/2.x]
jobs:
  publish:                          # different job name than master's `build`
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-node@v4    # checkout is no longer the first step
      - uses: actions/checkout@v3      # still a tag, and no `with:` block
      - run: make release
